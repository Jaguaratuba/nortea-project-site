<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login</title>
        <link rel="stylesheet" href="src/css/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
        <script type="text/javascript" src="src/js/validation.js" defer></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <script type="module" src="/src/js/supabase-config.js"></script>
    </head>

    <body class="login-body">
        <header class="header-login">
            <div class="logo">
                <img src="public/images/Logo.png" alt="Logo Pilar">
                <h1></h1>
            </div>
            <nav>
                <nav class="nav-link-normal-button">
                    <button class="hedrBtn" onclick="location.href='index.html'">INÍCIO</button> 
                    <button class="hedrBtn" onclick="location.href='help.html'">AJUDA</button>
                    <button class="hedrBtn" onclick="location.href='about-us.html'">SOBRE</button>
                </nav>

                <button class="hedrBtnCadast" id="loginBtn" onclick="location.href='login.html'">
                    ENTRAR <i class="bi bi-door-closed"></i>
                </button>
            </nav>
        </header>

        <section class="login-section-login">
            <div class="wrapper-login">
                <h1>Login</h1>
                <p id="error-message"></p>
                <form id="form">
                <div>
                    <label for="email-input">
                    <span>@</span>
                    </label>
                    <input type="email" name="email" id="email-input" placeholder="Email">
                </div>
                <div>
                    <label for="password-input">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm240-200q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/></svg>
                    </label>
                    <input type="password" name="password" id="password-input" placeholder="Senha">
                </div>
                <button type="submit">Login</button>
                </form>
                <p>Novo aqui? <a href="register.html">Crie uma conta</a></p>
                <a href="reset-password.html">Esqueci minha senha</a> <!-- ALTERAR ESTILIZAÇÃO -->
            </div>
        </section>
        
        <footer>
            © 2026 - Footer show de bola
        </footer>


        <script>
            const button = document.getElementById('ctaBtn');

            button.addEventListener('click', () => {
                alert('Botão clicado. Aqui você pode redirecionar ou abrir um formulário.');
            });
        </script>

        <script type="module" src="/src/js/supabase-config.js"></script>
        <script src="/src/js/supabase-auth.js" defer></script>
        <script src="/src/js/login.js" defer></script>
        <script src="/src/js/animationbutton.js" defer></script>
        <script src="/src/js/loginScroll.js" defer></script>
        <script src="/src/js/animationcarrosel.js" defer></script>
        <script src="/src/js/icon.js" defer></script>
        <script src="/src/js/headerMenu.js" defer></script>
    </body>
</html>
