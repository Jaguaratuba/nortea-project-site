<!DOCTYPE html> 
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Perfil do Usuário</title>
        <link rel="stylesheet" href="src/css/profile.css">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
        <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
        <script type="module" src="./src/js/supabase-config.js"></script>
    </head>

    <body>

        <header>
            <div class="logo">
                <img src="public/images/Logo.png" alt="Logo Pilar">
                <h1></h1>
            </div>
            <nav>
                <nav class="nav-link-normal-button">
                    <button class="hedrBtn" onclick="location.href='index.html'">INÍCIO</button> 
                    <button class="hedrBtn" onclick="location.href='help.html'">AJUDA</button>
                    <button class="hedrBtn" onclick="location.href='about-us.html'">SOBRE</button>
                </nav>

                <div class="header-profile">
                    <div class="header-avatar" id="headerAvatar">
                        <i class='bx bx-user' id="headerAvatarIcon"></i>
                        <img id="headerAvatarImg" hidden>
                    </div>

                    <div class="header-menu" id="headerMenu">
                        <button onclick="location.href='profile.html'">
                            <i class='bx bx-cog'></i>
                            <span>Configurações</span>
                        </button>

                        <button onclick="location.href='chat.html'">
                            <i class='bx bx-envelope'></i>
                            <span>Mensagens</span>
                        </button>

                        <button>
                            <i class='bx bx-archive'></i>
                            <span>Arquivos</span>
                        </button>

                        <button class="logout">
                            <i class='bx bx-arrow-from-left'></i>
                            <span>Sign out</span>
                        </button>
                    </div>
                </div>
            </nav>
        </header>

        <main class="container">

            <!-- Menu lateral -->
            <section class="profile-content">
                <nav class="menu">
                    <button onclick="location.href='profile.html'">Configurações</button>
                    <button class="active">Mensagens</button>
                </nav>

                <!-- Área de conteúdo -->
                <div class="content">

                    <div class="chat-area">

                        <div class="chat-box">
                            <div class="message received">
                                <p>Olá! Como posso ajudar?</p>
                            </div>

                            <div class="message sent">
                                <p>Oi! Quero falar sobre o projeto.</p>
                            </div>
                        </div>

                        <form class="chat-form">
                            <input type="text" placeholder="Digite sua mensagem...">
                            <button type="submit">
                                <i class='bx bx-send'></i>
                            </button>
                        </form>

                    </div>

                </div>
            </section>

        </main>

        <footer class="footer">
            © 2026 - Footer show de bola
        </footer>

        <script src="./src/js/pageTransition.js" defer></script>
        <script src="./src/js/supabase-auth.js" defer></script>
        <script src="./src/js/headerMenu.js" defer></script>
        <script src="./src/js/headerAvatar.js" defer></script>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const logoutBtn = document.querySelector(".header-menu .logout");
                if (!logoutBtn) return;

                logoutBtn.addEventListener("click", async () => {
                    const result = await window.SupabaseAuth.sign_out();
                    if (result.success) {
                        window.location.href = "index.html";
                    } else {
                        alert("Erro ao sair: " + result.error);
                    }
                });
            });
        </script>

    </body>

    <div id="page-transition"></div>
</html>
